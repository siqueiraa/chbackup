# =============================================================================
# release.yml -- Build & push Docker images on git tag push
# =============================================================================
# Triggered by pushing a version tag (e.g. `git tag v0.2.0 && git push --tags`).
# Builds multi-arch (linux/amd64 + linux/arm64) and pushes to Docker Hub.
#
# Tags produced:
#   siqueiraa/chbackup:latest
#   siqueiraa/chbackup:0.2.0      (from git tag)
#   siqueiraa/chbackup:0.2        (major.minor)
#
# Required GitHub Secrets:
#   DOCKERHUB_USERNAME -- Docker Hub username
#   DOCKERHUB_TOKEN    -- Docker Hub access token (not password)
# =============================================================================

name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: docker.io
  IMAGE_NAME: siqueiraa/chbackup

jobs:
  release:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from git tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v0.2.0
          VERSION="${TAG#v}"                 # e.g. 0.2.0
          MAJOR_MINOR="${VERSION%.*}"        # e.g. 0.2
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major_minor=$MAJOR_MINOR" >> "$GITHUB_OUTPUT"

      - name: Verify Cargo.toml version matches git tag
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Cargo.toml version ($CARGO_VERSION) != git tag ($TAG_VERSION)"
            echo "Update Cargo.toml version before tagging."
            exit 1
          fi
          echo "Version check passed: $CARGO_VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.major_minor }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          short-description: "ClickHouse backup & restore to S3. Static Rust binary, K8s sidecar, incremental, resumable."
          readme-filepath: ./README.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: chbackup ${{ steps.version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
