# =============================================================================
# sidecar.yaml -- chbackup sidecar container for ClickHouse pods
# =============================================================================
# Drop-in replacement for altinity/clickhouse-backup. Add this container to
# your existing ClickHouse pod (Deployment, StatefulSet, or ClickHouseInstallation).
#
# The sidecar runs in server+watch mode, providing:
#   - Automatic scheduled backups (full + incremental)
#   - On-demand operations via HTTP API (port 7171)
#   - Prometheus metrics (/metrics endpoint)
#
# Key requirement: chbackup MUST share the same data volume(s) as ClickHouse
# because FREEZE creates hardlinks in /var/lib/clickhouse/.
#
# For S3 credentials you can use:
#   - K8s secrets (shown below)
#   - IRSA (IAM Roles for Service Accounts) on EKS -- remove S3_ACCESS_KEY
#     and S3_SECRET_KEY env vars, add serviceAccount annotation instead
#   - Instance profile / node role
#
# Migration from clickhouse-backup:
#   Replace image altinity/clickhouse-backup → siqueiraa/chbackup
#   Same CLI commands, same config format, same API port (7171).
# =============================================================================

# ---------------------------------------------------------------------------
# Option 1: Standalone Deployment (simple single-node setup)
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clickhouse-with-backup
  labels:
    app: clickhouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clickhouse
  template:
    metadata:
      labels:
        app: clickhouse
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "7171"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 60

      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.8
          ports:
            - name: http
              containerPort: 8123
            - name: native
              containerPort: 9000
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20

        # -- chbackup sidecar --
        - name: chbackup
          image: siqueiraa/chbackup:latest
          args: ["server", "--watch"]
          ports:
            - name: api
              containerPort: 7171
          env:
            - name: API_LISTEN
              value: "0.0.0.0:7171"
            - name: S3_BUCKET
              value: "my-clickhouse-backups"
            - name: S3_REGION
              value: "us-east-1"
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: chbackup-s3-creds
                  key: access-key
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: chbackup-s3-creds
                  key: secret-key
            - name: WATCH_INTERVAL
              value: "1h"
            - name: FULL_INTERVAL
              value: "24h"
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /api/v1/status
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/status
              port: api
            initialDelaySeconds: 10
            periodSeconds: 30

      volumes:
        - name: data
          emptyDir: {}

---
